name: 🎯 Hassan Ahmadi - Download

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🔄 Download Mode'
        required: true
        type: choice
        options:
          - single
          - playlist
          - channel
          - search
        default: 'single'
      url:
        description: '🎬 URL or Search Query or channel name (@ChannelName or ChannelName)'
        required: true
        type: string
      type:
        description: '📦 Output Type'
        required: true
        type: choice
        options:
          - video
          - audio
        default: 'video'
      quality:
        description: 'Quality (video: 144/360/480/720/1080 | audio: 128/192/320)'
        required: false
        type: string
        default: '720'
      max_videos:
        description: '🔢 Max results (up to 100 or more)'
        required: false
        type: number
        default: 100
      split_threshold_mb:
        description: '📦 Split > MB (0=no)'
        required: false
        type: number
        default: 50
      output_folder:
        description: '📁 Output Folder Name (where to save videos)'
        required: false
        type: string
        default: 'downloads'

env:
  PYTHONUNBUFFERED: '1'
  DEBIAN_FRONTEND: 'noninteractive'

jobs:
  download-and-process:
    name: 🚀 YouTube Downloader
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}

      - name: ⚡ Setup
        run: |
          python3 -c "import requests" 2>/dev/null || pip3 install -q requests
          command -v yt-dlp &>/dev/null || pip3 install -q yt-dlp
          command -v zip &>/dev/null || (sudo apt-get update -qq && sudo apt-get install -y -qq zip)

      - name: 🔗 Prepare
        id: prep
        run: |
          M="${{ github.event.inputs.mode }}"
          U="${{ github.event.inputs.url }}"
          [[ "$M" == "channel" && "$U" != http* ]] && U="https://www.youtube.com/$([[ "$U" == @* ]] && echo "$U" || echo "@$U")"
          echo "URL=$U" >> $GITHUB_OUTPUT
          echo "MODE=$M" >> $GITHUB_OUTPUT
          echo "OUTPUT_FOLDER=${{ github.event.inputs.output_folder }}" >> $GITHUB_OUTPUT

      - name: 🎯 Download & Process
        id: main
        env:
          MODE: ${{ steps.prep.outputs.MODE }}
          URL: ${{ steps.prep.outputs.URL }}
          TYPE: ${{ github.event.inputs.type }}
          QUALITY: ${{ github.event.inputs.quality }}
          MAX: ${{ github.event.inputs.max_videos }}
          SPLIT: ${{ github.event.inputs.split_threshold_mb }}
          OUTPUT_FOLDER: ${{ steps.prep.outputs.OUTPUT_FOLDER }}
        run: |
          python3 << 'PYEOF'
          import os, json, time, re, subprocess, sys, hashlib
          import requests as rq
          from pathlib import Path
          from datetime import datetime

          M = os.environ['MODE']
          U = os.environ['URL']
          T = os.environ['TYPE']
          Q = os.environ.get('QUALITY', '720')
          MX = int(os.environ.get('MAX', '100'))  # Default now 100
          SP = int(os.environ.get('SPLIT', '50'))
          BASE_OUTPUT = os.environ.get('OUTPUT_FOLDER', 'downloads')

          API = 'https://hub.ytconvert.org/api/download'
          H = {
              'User-Agent': 'Mozilla/5.0',
              'Accept': 'application/json',
              'Referer': 'https://media.ytmp3.gg/',
              'Content-Type': 'application/json',
              'Origin': 'https://media.ytmp3.gg'
          }

          def safe_name(text, maxlen=100):
              """Create safe filename from text (longer for full video titles)"""
              safe = re.sub(r'[^\w\s\-]', '', text)
              safe = re.sub(r'[\s]+', '_', safe)
              safe = re.sub(r'_+', '_', safe).strip('_')
              safe = safe[:maxlen]
              if not safe:
                  safe = hashlib.md5(text.encode()).hexdigest()[:8]
              return safe

          def get_video_title(vid):
              """Get actual video title using yt-dlp"""
              try:
                  r = subprocess.run(
                      ['yt-dlp', '--get-title', '--no-warnings', '--no-check-certificate',
                       f'https://youtube.com/watch?v={vid}'],
                      capture_output=True, text=True, timeout=15
                  )
                  if r.returncode == 0 and r.stdout.strip():
                      return r.stdout.strip()
              except:
                  pass
              return None

          def fm(n):
              if not n: return 'N/A'
              try:
                  n = int(n)
                  return f'{n/1e6:.1f}M' if n >= 1e6 else f'{n/1e3:.1f}K' if n >= 1e3 else str(n)
              except: return str(n)

          def gv(vid):
              """Get video info AND channel name from actual video data"""
              try:
                  r = subprocess.run(
                      ['yt-dlp', '--dump-json', '--no-warnings', '--no-check-certificate',
                       f'https://youtube.com/watch?v={vid}'],
                      capture_output=True, text=True, timeout=15
                  )
                  if r.returncode == 0 and r.stdout.strip():
                      d = json.loads(r.stdout)
                      channel = (d.get('channel') or d.get('uploader') or 
                                d.get('uploader_id') or d.get('creator') or 'Unknown')
                      title = d.get('title', 'Untitled')
                      views = d.get('view_count')
                      duration = d.get('duration', 0)
                      channel_url = d.get('channel_url', '') or d.get('uploader_url', '')
                      handle = None
                      if channel_url:
                          m = re.search(r'@([\w-]+)', channel_url)
                          if m: handle = m.group(1)
                      if not handle:
                          handle = safe_name(channel, 30) if channel and channel != 'Unknown' else None
                      return (channel.strip() if channel else 'Unknown', title, views, int(duration) if duration else 0, handle)
              except: pass
              return ('Unknown', 'Untitled', None, 0, None)

          def get_channel_from_url(url):
              m = re.search(r'@([\w-]+)', url)
              if m: return m.group(1)
              m = re.search(r'channel/([\w-]+)', url)
              if m: return m.group(1)
              m = re.search(r'c/([\w-]+)', url)
              if m: return m.group(1)
              m = re.search(r'user/([\w-]+)', url)
              if m: return m.group(1)
              return None

          def get_channel_from_playlist(playlist_url):
              try:
                  cmd = ['yt-dlp', '--flat-playlist', '--dump-json', '--playlist-end', '1',
                         '--no-warnings', '--no-check-certificate', playlist_url]
                  r = subprocess.run(cmd, capture_output=True, text=True, timeout=15)
                  if r.returncode == 0 and r.stdout.strip():
                      d = json.loads(r.stdout.strip().split('\n')[0])
                      vid = d.get('id', '')
                      if vid:
                          ch, _, _, _, handle = gv(vid)
                          if handle: return handle
                      ch = d.get('channel') or d.get('uploader') or d.get('uploader_id')
                      if ch: return safe_name(ch, 30)
              except: pass
              return None

          def gvl(u, n):
              v = []
              channel_folder = get_channel_from_url(u)
              
              if not channel_folder and 'playlist' in u:
                  print(f'   🔍 Detecting channel from playlist...')
                  channel_folder = get_channel_from_playlist(u)
              
              if not channel_folder:
                  channel_folder = 'playlist_videos'
              
              print(f'   📁 Target folder: {BASE_OUTPUT}/{channel_folder}_videos')
              
              c = ['yt-dlp', '--flat-playlist', '--dump-json', '--no-warnings', '--no-check-certificate']
              if n > 0: c.extend(['--playlist-end', str(n)])
              c.append(u)
              r = subprocess.run(c, capture_output=True, text=True, timeout=60)  # Increased timeout for large playlists
              
              for line in r.stdout.strip().split('\n'):
                  if line and len(v) < n:
                      try:
                          d = json.loads(line)
                          vid = d.get('id', '')
                          if not vid: continue
                          
                          flat_title = d.get('title', 'Untitled')
                          print(f'   📊 [{len(v)+1}/{n}] {flat_title[:50]}...')
                          
                          ch, full_title, vw, dr, handle = gv(vid)
                          
                          if not ch or ch == 'Unknown':
                              ch = (d.get('channel') or d.get('uploader') or 
                                    d.get('uploader_id') or d.get('creator') or 'Unknown')
                          if not vw: vw = d.get('view_count')
                          if not dr: dr = d.get('duration', 0)
                          
                          # Use the real video title
                          video_title = full_title if full_title != 'Untitled' else flat_title
                          
                          v.append({
                              'id': vid, 
                              't': video_title,
                              'flat_t': flat_title,
                              'u': f'https://youtube.com/watch?v={vid}',
                              'dr': int(dr) if dr else 0,
                              'th': f'https://i.ytimg.com/vi/{vid}/maxresdefault.jpg',
                              'c': str(ch).strip() if ch else 'Unknown',
                              'v': fm(vw)
                          })
                      except Exception as e:
                          print(f'      ⚠️ Skip: {str(e)[:40]}')
                          continue
              
              return v, channel_folder

          def dl_video(u):
              e = 'mp3' if T == 'audio' else 'mp4'
              p = {'url': u, 'os': 'linux', 'output': {'type': 'audio' if T == 'audio' else 'video', 'format': e}}
              if T == 'audio': p['audio'] = {'bitrate': f'{Q}k'}
              else: p['output']['quality'] = f'{Q}p'

              for retry in range(3):
                  if retry > 0:
                      print(f'   🔄 Retry {retry}/3...')
                      time.sleep(5)
                  try:
                      rr = rq.post(API, json=p, headers=H, timeout=15)
                      if rr.status_code != 200: continue
                      d = rr.json()
                      su = d.get('statusUrl')
                      if not su: continue
                      print(f'   ⏳ Converting...')
                      for _ in range(60):
                          time.sleep(2)
                          try:
                              sr = rq.get(su, headers=H, timeout=10)
                              if sr.status_code == 200:
                                  sd = sr.json()
                                  st = sd.get('status', '')
                                  if st == 'completed':
                                      du = sd.get('downloadUrl')
                                      if du: return {'u': du, 'e': e}
                                  elif st in ('failed', 'error'): break
                          except: continue
                  except: time.sleep(2)
              return None

          def download_file(url, filepath):
              try:
                  dr = rq.get(url, headers=H, stream=True, timeout=600)
                  if dr.status_code == 200:
                      total = int(dr.headers.get('content-length', 0))
                      done = 0
                      with open(filepath, 'wb') as f:
                          for chunk in dr.iter_content(65536):
                              f.write(chunk)
                              done += len(chunk)
                              if total > 0 and done % (10*65536) == 0:
                                  print(f'\r   ⬇️ {done*100/total:.1f}%', end='')
                      print(f'\r   ⬇️ 100.0%')
                      return filepath.stat().st_size
              except Exception as e:
                  print(f'   ❌ Download error: {e}')
              return 0

          def split_file(filepath, threshold_mb):
              size_mb = filepath.stat().st_size / 1e6
              if threshold_mb > 0 and size_mb > threshold_mb:
                  print(f'   ✂️ Splitting ({size_mb:.0f}MB) into {threshold_mb}MB parts...')
                  parent = filepath.parent
                  name = filepath.name
                  subprocess.run(['zip', '-r', '-q', '-s', f'{threshold_mb}m', f'{name}.zip', name], cwd=parent, check=True)
                  filepath.unlink()
                  parts = sorted(parent.glob(f'{name}.z*'))
                  print(f'   ✅ Split into {len(parts)} parts')
                  return True
              return False

          print(f'{"="*50}')
          print(f'🎬 {M.upper()} MODE')
          print(f'📁 Output base folder: {BASE_OUTPUT}')
          print(f'🔢 Max videos: {MX}')
          print(f'{"="*50}')

          if M == 'search':
              v, _ = gvl(f'ytsearch{MX}:{U}', MX)
              if not v: print('❌ No results'); sys.exit(1)
              
              # Create search folder
              search_folder = Path(f'{BASE_OUTPUT}/search_results')
              search_folder.mkdir(parents=True, exist_ok=True)
              
              qs = safe_name(U, 30)
              ts = datetime.now().strftime('%Y-%m-%d_%H-%M-%S')
              f = search_folder / f'{qs}_{ts}.md'
              
              m = (f'# 🔍 Search: {U}\n\n**{datetime.now():%Y-%m-%d %H:%M}** | **{len(v)} results**\n\n'
                   f'| # | Thumbnail | Title | Channel | Views | Duration |\n'
                   f'|---|-----------|-------|---------|-------|----------|\n')
              for i, x in enumerate(v, 1):
                  m += f'| {i} | [<img src="{x["th"]}" width="80">]({x["u"]}) | [{x["t"]}]({x["u"]}) | {x["c"][:20]} | {x["v"]} | {x["dr"]//60}m |\n'
              m += '\n---\n\n'
              for i, x in enumerate(v, 1):
                  m += (f'### {i}. {x["t"]}\n\n<img src="{x["th"]}" width="640">\n\n'
                       f'| Property | Value |\n|----------|-------|\n'
                       f'| Channel | {x["c"]} |\n| Duration | {x["dr"]//60}m |\n'
                       f'| Views | {x["v"]} |\n| ID | `{x["id"]}` |\n| URL | {x["u"]} |\n\n---\n\n')
              f.write_text(m)
              print(f'✅ Search results saved to {f}')

          elif M in ('playlist', 'channel'):
              print(f'\n📋 Extracting videos...')
              v, cn = gvl(U, MX)
              if not v: print('❌ No videos found'); sys.exit(1)

              # Create folder (exist_ok=True means don't recreate if exists)
              cd = Path(f'{BASE_OUTPUT}/{cn}_videos')
              cd.mkdir(parents=True, exist_ok=True)
              print(f'📁 Using folder: {cd} {"(already existed)" if cd.exists() else "(created new)"}')

              ok, fl = [], []
              print(f'\n📥 Downloading {len(v)} videos...\n{"="*50}')
              
              for i, x in enumerate(v, 1):
                  print(f'\n📥 [{i}/{len(v)}]')
                  print(f'   Title: {x["t"][:50]}...')
                  print(f'   Channel: {x["c"]} | Duration: {x["dr"]//60}m | Views: {x["v"]}')
                  
                  result = dl_video(x['u'])
                  if result:
                      # Use video title as filename (with safe characters)
                      safe_title = safe_name(x['t'], 80)
                      filename = f'{safe_title}_{x["id"]}.{result["e"]}'
                      fp = cd / filename
                      
                      # Check if file already exists
                      if fp.exists():
                          print(f'   ⏭️ File already exists, skipping: {filename}')
                          ok.append(x['t'])
                          continue
                      
                      size = download_file(result['u'], fp)
                      if size:
                          print(f'   ✅ Downloaded ({size/1e6:.1f}MB) as: {filename}')
                          split_file(fp, SP)
                          ok.append(x['t'])
                      else:
                          print(f'   ❌ Download failed')
                          fl.append(x['t'])
                  else:
                      print(f'   ❌ Conversion failed')
                      fl.append(x['t'])
                  
                  if i < len(v): 
                      print(f'   ⏳ Waiting...')
                      time.sleep(2)

              print(f'\n{"="*50}')
              print(f'📊 {len(ok)}/{len(v)} downloaded successfully')
              print(f'📁 Saved in: {cd}')
              if fl: print(f'❌ Failed: {fl}')
              print(f'{"="*50}')

          else:
              # Single video mode
              print(f'\n📹 Single video mode')
              
              vid_match = re.search(r'(?:v=|/)([\w-]{11})', U)
              if not vid_match:
                  print('❌ Could not extract video ID')
                  sys.exit(1)
              
              vid = vid_match.group(1)
              
              # Get video info (title and channel)
              ch, title, _, _, handle = gv(vid)
              print(f'   📹 Title: {title}')
              print(f'   📺 Channel: {ch}')
              
              # Determine folder
              cn = handle if handle else get_channel_from_url(U) or safe_name(ch, 30) or 'video'
              
              result = dl_video(U)
              if result:
                  cd = Path(f'{BASE_OUTPUT}/{cn}_videos')
                  cd.mkdir(parents=True, exist_ok=True)
                  print(f'📁 Using folder: {cd} {"(already existed)" if cd.exists() else "(created new)"}')
                  
                  # Use video title as filename
                  safe_title = safe_name(title, 80)
                  filename = f'{safe_title}_{vid}.{result["e"]}'
                  fp = cd / filename
                  
                  if fp.exists():
                      print(f'   ⏭️ File already exists: {filename}')
                  else:
                      size = download_file(result['u'], fp)
                      if size:
                          print(f'✅ Saved: {filename}')
                          print(f'   📁 Location: {cd}/')
                          print(f'   📦 Size: {size/1e6:.1f}MB')
                          split_file(fp, SP)
                      else:
                          print('❌ Download failed')
                          sys.exit(1)
              else:
                  print('❌ Conversion failed'); sys.exit(1)
          
          PYEOF

      - name: 📤 Push Files
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📤 PUSHING TO GITHUB"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          
          echo ""
          echo "📋 Adding all files..."
          git add -A
          
          TOTAL=$(git diff --cached --name-only | wc -l)
          echo "   Found $TOTAL files"
          
          if [ "$TOTAL" -eq 0 ]; then
            echo "❌ Nothing to push"
            exit 0
          fi
          
          git diff --cached --name-only | while read f; do
            echo "   📎 $f"
          done
          
          echo ""
          echo "📤 Pushing..."
          
          git commit -m "📦 $(date +%m%d-%H%M) [skip ci]" --quiet
          
          for i in 1 2 3 4 5; do
            echo -n "   🚀 Attempt $i/5..."
            if git pull --rebase --quiet 2>/dev/null && git push --quiet 2>/dev/null; then
              echo " ✅ DONE!"
              exit 0
            fi
            echo " ❌"
            git rebase --abort 2>/dev/null
            [ $i -lt 5 ] && sleep $((i*5))
          done
          
          echo "   ❌ Push failed"
          exit 1
